function pointInsideVerticalLinearLimit(x,x0,left){
    return (x < x0) && left || (x > x0) && !left
}
function pointInsideNonVerticalLinearLimit(x,y,a,b,bottom){
    return (a*x + b < y) && bottom || (a*x + b > y) && !bottom
}
function lineFromTwoPoints(x1,y1,x2,y2){
    if(x1 == x2){
        if(y1 == y2)
            throw new Error('Two points are in the same places: '+x1+', '+y1)
        return {vertical:true,x:x1}
    }
    
    var a = (y1-y2) / (x1-x2)
    return {vertical:false, a:a, b: y1 - x1 * a}
}
function distanceFromLine(px,py,l1,l2){
    var x1 = l1[0]
    var y1 = l1[1]
    var x2 = l2[0]
    var y2 = l2[1]
    if(x1 == x2){
        if(y1 == y2)
            throw new Error('Two points are in the same places: '+x1+', '+y1)
        return Math.abs(x1-px)
    }
    
    var a = (y1-y2) / (x1-x2)
    var b = y1 - x1 * a
    
    return Math.abs( a * px + py + b ) / Math.sqrt( a*a + b*b )
}
function bisectorFromTwoPoints(x1,y1,x2,y2){
    if(y1 == y2){
        if(x1 == x2)
            throw new Error('Two points are in the same places: '+x1+', '+y1)
        return {vertical:true,x:(x1+x2)/2,firstLeftBottom:x1 < x2}
    }
    
    var a = (x2-x1) / (y1-y2)
    return {vertical:false, a:a, b: (y1 + y2 - a * (x1 + x2)) / 2,firstLeftBottom: y1 > y2}
}

function intersectionOfNonVerticalLineAndVerticalLine(a,b,x){    
    return [x, a * x + b]
}
function intersectionOfTwoNonVerticalLines(a1,b1,a2,b2){    
    if(a1-a2 == 0)
        return null
    var x = (b2 - b1) / (a1 - a2)
    return [x, a1 * x + b1]
}

function intersectionOfVerticalLineAndLineEquation(x,eq){
    if(eq.vertical){
        return null
    } else {
        return intersectionOfNonVerticalLineAndVerticalLine(eq.a,eq.b,x)
    }
}
function intersectionOfNonVerticalLineAndLineEquation(a,b,eq){
    if(eq.vertical){
        return intersectionOfNonVerticalLineAndVerticalLine(a,b,eq.x)
    } else {
        return intersectionOfTwoNonVerticalLines(a,b,eq.a,eq.b)
    }
}
function pointsEqual(p1,p2){
    return Math.abs(p1[0]-p2[0]) < 0.00000001 && Math.abs(p1[1]-p2[1]) < 0.00000001
}

function getPolygonSegments(poly){
    var segments = []
    for(var i in poly){
        var band = poly[i]
        for(var j in band){
            var point1 = band[j]
            var point2 = band[(j-(-1)) % band.length]
            
            segments.push([point1,point2])
        }
    }
    return segments
}

function polygonOrder(polygon){
    var minY = polygon.map(a=>a[1]).reduce((a,b)=>Math.min(a,b),Infinity)
    
    var minimal = polygon.filter(a => a[1] == minY).sort((a,b)=>b[0]-a[0])[0]
    
    var ix = -1
    for(var i in polygon){
        if(polygon[i] == minimal){
            ix = i
            break
        }
    }
    var p1 = polygon[ix]
    var p2 = polygon[(ix-1+polygon.length)%polygon.length]
    var p3 = polygon[(ix-(-1))%polygon.length]
    
    var v1 = [p2[0]-p1[0],p2[1]-p1[1]]
    var v2 = [p3[0]-p1[0],p3[1]-p1[1]]
    
    return -Math.sign(v1[0]*v2[1]-v1[1]*v2[0])
}

function segmentsIntersection(a1,a2,b1,b2){
    var x1 = a1[0]
    var y1 = a1[1]
    var x2 = a2[0]
    var y2 = a2[1]
    var x3 = b1[0]
    var y3 = b1[1]
    var x4 = b2[0]
    var y4 = b2[1]
    
    var divisor = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4)
    
    return [
        ((x1*y2 - y1*x2) * (x3 - x4) - (x1 - x2) * (x3*y4 - y3*x4)) / divisor,
        ((x1*y2 - y1*x2) * (y3 - y4) - (y1 - y2) * (x3*y4 - y3*x4)) / divisor
    ]
}
function ccw(a,b,c){
    return (c[1]-a[1]) * (b[0]-a[0]) >= (b[1]-a[1]) * (c[0]-a[0])
}
function segmentsIntersecting(a1,a2,b1,b2){
    return ccw(a1,b1,b2) != ccw(a2,b1,b2) && ccw(a1,a2,b1) != ccw(a1,a2,b2)
}
function segmentsIntersectingWithPolygons(a,b,polygons){
    for(var i in polygons){
        var polygon = polygons[i]
        if(segmentsIntersectingWithPolygon(a,b,polygon))
            return true
    }
    return false
}
function segmentsOnTheGoodSideOfPolygon(a,b,polygons,inside){
    var halfPoint1 = edgeHalfPointMoved(a,b,-0.1)
    var halfPoint2 = edgeHalfPointMoved(a,b, 0.1)
    
    for(var i in polygons){
        var polygon = polygons[i]

        if(!inside && (hitTest(polygon,halfPoint1[0],halfPoint1[1]) && hitTest(polygon,halfPoint2[0],halfPoint2[1])))
            return false
            
        if(inside && (!hitTest(polygon,halfPoint1[0],halfPoint1[1]) && !hitTest(polygon,halfPoint2[0],halfPoint2[1])))
            return false
    }
    return true
}
function segmentsIntersectingWithPolygon(a,b,polygon){
    for(var i = 0;i<polygon.length;i++){
        var band = polygon[i]
        for(var j = 0;j<band.length;j++){
            var p1 = band[j]
            var p2 = band[(j-(-1))%band.length]
            
            if(segmentsIntersecting(a,b,p1,p2)){
                return true
            }
        }
    }
    return false
}
function getCrossingSegmentsIntersectingWithPolygon(a,b,polygon){
    var count = 0
    for(var i = 0;i<polygon.length;i++){
        var band = polygon[i]
        for(var j = 0;j<band.length;j++){
            var p1 = band[j]
            var p2 = band[(j-(-1))%band.length]
            
            if(segmentsIntersecting(a,b,p1,p2)){
                var intersection = segmentsIntersection(a,b,p1,p2)
                
                if(dist(intersection[0],intersection[1],a[0],a[1]) >= 0.0001)
                    return intersection
            }
        }
    }
    return null
}

function hitTestBand(poly,x,y,inclusive){
    var segmentsToCheck = []
    for(var i in poly){
        var s = [poly[i], poly[(i-(-1))%poly.length]]
        if(s[0][0] > s[1][0])
            s = s.reverse()
        
        if(s[0][0] < x && s[1][0] > x){
            segmentsToCheck.push(s)
        }
    }
    var number = 0
    for(var i in segmentsToCheck){
        var segment = segmentsToCheck[i]
        
        var lf2p = lineFromTwoPoints(segment[0][0],segment[0][1],segment[1][0],segment[1][1])
        
        //    return {vertical:false, a:a, b: y1 - x1 * a}

        if(y < lf2p.a*x+lf2p.b || inclusive && y <= lf2p.a*x+lf2p.b)
            number++
    }
    return number % 2 != 0
}

}
function almostHitTest(poly,x,y,inclusive){
    for(var i = -1;i<=1;i++){
        for(var j = -1;j<=1;j++){
            if(hitTest(poly,x-(-i),y-(-j),inclusive)){
                return true
            }
        }
    }
    return false
}
function getPolygonInside(lands,x,y){
    for(var i in lands){
        var land = lands[i]
        if(hitTest(land,x,y)){
            return land
        }
    }
    return null
}
function bandInside(landInside_, landOutside, inclusive){
    for(var i in landInside_){
        var point = landInside_[i]
        if(!hitTestBand(landOutside,point[0],point[1],inclusive)){
            return false
        }
    }
    return true
}
function landInside(landInside_, landOutside, inclusive){
    for(var i in landInside_){
        var point = landInside_[i]
        if(!hitTest(landOutside,point[0],point[1],inclusive)){
            return false
        }
    }
    return true
}
function normalizePolygons(polygons){
    for(var i in polygons){
        var poly = polygons[i]
        if(polygonOrder(poly) != -1){
            polygons[i] = poly.reverse()
        }
    }
}
function dist(x1,y1,x2,y2){
    return Math.max(Math.abs(x2-x1), Math.abs(y2-y1))
}
function polygonEdgeHalfPointMoved(polygon,index,radiusMoved){
    var p1 = polygon[index]
    var p2 = polygon[(index-(-1))%polygon.length]
    
    var angle = Math.atan2(p2[1]-p1[1],p2[0]-p1[0])
    
    return [(p1[0]+p2[0])/2 + Math.sin(angle)*radiusMoved,(p1[1]+p2[1])/2 - Math.cos(angle)*radiusMoved]
}
function edgeHalfPointMoved(p1,p2,radiusMoved){    
    var angle = Math.atan2(p2[1]-p1[1],p2[0]-p1[0])
    
    return [(p1[0]+p2[0])/2 + Math.sin(angle)*radiusMoved,(p1[1]+p2[1])/2 - Math.cos(angle)*radiusMoved]
}

function getVectorPath(unit,x,y,lands,port){
    var inside = !port
    
    if(unit.land != null && !port){
        lands = [unit.land]
    }
    
    var unitx = unit.x
    var unity = unit.y
    if(port && unit.towntaken != null){
        unitx = unit.towntaken.port[0]
        unity = unit.towntaken.port[1]
    }
    
    var pointDestinations = [{point:[unitx,unity],dist:0,from:null}]
    
    var firstCode = unitx+'#'+unity
    var pointDestinationStack = {}
    pointDestinationStack[firstCode] = pointDestinations[0]
    var lastCode = x+'#'+y
    pointDestinationStack[lastCode] = {point:[x,y],dist:null,from:null}

    var usedPoints = {}
    usedPoints[firstCode] = true
    for(var i in lands){
        var land = lands[i]
        for(var j in land){
            var band = land[j]
            for(var k in band){
                var point = band[k]
                var code = point[0]+'#'+point[1]
                pointDestinationStack[code] = {point:[point[0],point[1]],dist:null,from:null}
            }
        }
    }
    var tries = 5
    while(pointDestinations.length > 0 && tries > 0){
        var pointDestinations2 = []
        
        for(var i in pointDestinations){
            var destination = pointDestinations[i]
            
            var key = destination.point[0]+'#'+destination.point[1]
            for(var code in pointDestinationStack){
                var potentialPointDestination = pointDestinationStack[code]
                var last = port && code === lastCode
                
                if(!(code in usedPoints) && key != code && (!segmentsIntersectingWithPolygons(destination.point, potentialPointDestination.point, lands) || !segmentsIntersectingWithPolygons(potentialPointDestination.point, destination.point, lands) || last && segmentsIntersectingWithPolygonsCount(destination.point, potentialPointDestination.point, lands) <= 1)
                && (segmentsOnTheGoodSideOfPolygon(destination.point, potentialPointDestination.point, lands, inside)/* || last && segmentsIntersectingWithPolygonsCount(destination.point, potentialPointDestination.point, lands) <= 1*/)){
                    var distance = Math.sqrt(Math.pow(destination.point[0] - potentialPointDestination.point[0],2) + Math.pow(destination.point[1] - potentialPointDestination.point[1],2))
                    var newDistance = destination.dist + distance

                    if(potentialPointDestination.dist == null || potentialPointDestination.dist > newDistance){
                        if(potentialPointDestination.from == null)
                            pointDestinations2.push(potentialPointDestination)
                        potentialPointDestination.dist = newDistance
                        potentialPointDestination.from = destination
                    }
                }
            }
            //usedPoints[key] = true
        }
        
        pointDestinations = pointDestinations2
        tries--
    }
    var path = []
    var stackPoint = pointDestinationStack[lastCode]
    while(stackPoint != null){
        path.push(stackPoint.point)
        stackPoint = stackPoint.from
    }
    path = path.reverse()
    /*
    console.log(path)
    drawPathTemp(path)
    console.log(path[0] == pointDestinationStack[firstCode].point)
    throw new Error('gaga')
    */
    if(path[0] == pointDestinationStack[firstCode].point)
        return path
    return null
}

class Chunk {
    constructor(x,y,polygons,l,t,r,b){
        polygons = nonVerticalLinearLimitPolygons(polygons,0,t,true)
        polygons = nonVerticalLinearLimitPolygons(polygons,0,b,false)
        polygons = verticalLinearLimitPolygons(polygons,l,false)
        polygons = verticalLinearLimitPolygons(polygons,r,true)
    
        this.polygons = polygons
        this.l = l
        this.t = t
        this.r = r
        this.b = b
        
        this.x = x
        this.y = y
        
        this.nearChunkCodes = this.createNearChunkCodes()
    }
    createNearChunkCodes(){
        var nearChunkCodes = []
        for(var i = -1;i<=1;i++){
            for(var j = -1;j<=1;j++){
                nearChunkCodes.push((this.x-(-i))+'#'+(this.y-(-j)))
            }
        }
        return nearChunkCodes
    }
}

        var {WIDTH} = townData()

        var t = this.y-WIDTH*2
        var b = this.y

        return  segmentsIntersecting([x1,y1],[x2,y2],[l,t],[r,t])
                ||

                ||

                || 
                segmentsIntersecting([x1,y1],[x2,y2],[r,t],[r,b])

    }
    checkPathThrough(path){
        for(var i = 1;i<path.length;i++){
            var p1 = path[i-1]

            if(checkSegmentThrough(p1[0],p1[1],p2[0],p2[1]))

        }

    }

    }
    setChunk(chunk){
        this.chunk = chunk
    }
    leaveTown(){
        if(this.towntaken != null){
            this.towntaken.occupyingUnit = null
            this.towntaken = null
        }
    }
    leavePartOfUnit(division){
        var size1 = this.sizeAfterDivision(division)
        var size2 = this.size - size1
        
        this.size = size1
        if(size2 > 0){
            var newUnit = new Unit(this.x,this.y,size2,this.team,this.land)
            newUnit.setChunk(this.chunk)
            if(this.towntaken != null){
                this.towntaken.setOccupyingUnit(newUnit)
                this.towntaken = null
                
                if(this.embarking)
                    this.land = null
            }
            return newUnit
        } else {
            this.leaveTown()
            return null
        }
    }
    setPath(x,y,target){
        if(target != null)
            this.target = target
        else
            this.target = null
        this.path = [[x,y]]
    }
    setLinePath(path,target){
        if(target != null)
            this.target = target
        else
            this.target = null
        this.path = path.slice()
    }
    removePath(){
        this.path = []
    }
    tryTakeOverTown(){
        if(this.target.occupyingUnit == null){
            this.setTargetAsTown()
        } else if(this.target.occupyingUnit.team == this.team) {
            this.tryToMergeWithUnit(this.target.occupyingUnit)
            this.target = null
        }
    }
    tryToMergeWithTarget(){
        var unitTarget = this.target instanceof Town ? this.target.occupyingUnit : this.target
        this.tryToMergeWithUnit(unitTarget)
        this.target = null
        this.removePath()
    }
    tryToMergeWithUnit(unit){
        if(this.size + unit.size > 99){
            this.size = this.size + unit.size - 99
            unit.size = 99
        } else {
            unit.size -= -this.size
            this.die()
        }
        this.embarkingProgress = this.size
        unit.embarkingProgress = unit.size
    }
    setTargetAsTown(){
        this.towntaken = this.target
        this.target.setOccupyingUnit(this)
        this.target = null
        this.land = this.towntaken.land

        this.embarking = false
        this.barkingPoint = null
        this.barkingLand = null
    }
    tooClose(unit2){
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()
        
        return Math.abs(this.x - unit2.x) < WIDTH && Math.abs(this.y - unit2.y) < HEIGHT
    }
    atPathEndAndInDirection(unit2){
        if(this.path.length == 0)
            return false
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()

        var pathTarget = this.path[this.path.length - 1]
        
        return (this.x < unit2.x && this.x < pathTarget[0] || this.x > unit2.x && this.x > pathTarget[0]) &&
               (this.y < unit2.y && this.y < pathTarget[1] || this.y > unit2.y && this.y > pathTarget[1]) &&
                Math.abs(this.x - pathTarget[0]) < WIDTH*2 && Math.abs(this.y - pathTarget[1]) < HEIGHT*2
    }
    checkSegmentThrough(x1,y1,x2,y2){
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()
        var l = this.x-WIDTH/2
        var r = this.x+WIDTH/2
        var t = this.y-HEIGHT/2
        var b = this.y+HEIGHT/2
        //        return mouseCoords != null && mouseCoords.x > unit.x-WIDTH/2 && mouseCoords.x < unit.x+WIDTH/2 && mouseCoords.y > unit.y-HEIGHT/2-OFFSET && mouseCoords.y < unit.y+HEIGHT/2-OFFSET


        return  segmentsIntersecting([x1,y1],[x2,y2],[l,t],[r,t])
                || 
                segmentsIntersecting([x1,y1],[x2,y2],[l,b],[r,b])
                || 
                segmentsIntersecting([x1,y1],[x2,y2],[l,t],[l,b])
                || 
                segmentsIntersecting([x1,y1],[x2,y2],[r,t],[r,b])

    }
    checkPathThrough(path){
        for(var i = 1;i<path.length;i++){
            var p1 = path[i-1]
            var p2 = path[i]
            
            if(checkSegmentThrough(p1[0],p1[1],p2[0],p2[1]))
                return true
        }
        return false
    }
    sizeAfterDivision(division){
        return Math.ceil(this.size * division)
    }
    inProcessOfEmbarking(){
        return this.embarking && this.embarkingProgress < this.size
    }
    tryDisembark(){
        if(this.barkingPoint != null && this.path.length == 1){
            var p1 = [this.x,this.y]
            var p2 = this.path[0]
            
            if( this.embarking && this.embarkingProgress >= this.size && 
                (p1[0] < p2[0] && p1[0] > this.barkingPoint[0] || p1[0] > p2[0] && p1[0] < this.barkingPoint[0])
                    &&
                (p1[1] < p2[1] && p1[1] > this.barkingPoint[1] || p1[1] > p2[1] && p1[1] < this.barkingPoint[1])
            ){
                this.embarking = false
                this.land = this.barkingLand
                this.barkingPoint = null
                this.barkingLand = null
            } else if(!this.embarking){
                this.land = this.barkingLand
                this.barkingPoint = null
                this.barkingLand = null
            }
        }
    }
}

            var land = lands[i]
            for(var j in land){
                var point = land[j]
                
                if(point[0][0] <= 1 || point[0][1] <= 1 || point[0][0] >= this.WIDTH-1 || point[0][1] >= this.WIDTH-1)
                    this.generationPoints[i].land = false
            }
        }
        
        for(var i in this.graph){
            for(var j in this.graph[i]){
                if(!this.generationPoints[j].land)
                    delete this.graph[i][j]                
            }
        }
        for(var i in this.graph){
            if(!this.generationPoints[i].land){
                delete this.graph[i]
            }
        }
        this.oldgenerationPoints = this.generationPoints.slice()
/*        this.generationPoints = this.generationPoints.filter(a => a != undefined)
        lands = lands.filter(a => a != undefined)

        return lands*/
        var k = 0
        while(Object.keys(this.graph).length > 0 && k<=100){
            var key1 = Object.keys(this.graph)[0]
            if(Object.keys(this.graph[key1]).length == 0){
                delete this.graph[key1]
                continue
            }
            for(var key2 in this.graph[key1]){
                if(key2 in lands){
                    var merged = mergePolygonsOnSides(lands[key1],lands[key2])
                    if(merged != null)
                        lands[key1] = merged
                }
                for(var key3 in this.graph[key2]){
                    if(key3 != key1){
                        this.graph[key1][key3] = true
                        if(key3 in this.graph)
                            this.graph[key3][key1] = true
                    }
                }
                delete this.graph[key1][key2]
                delete this.graph[key2]
                delete lands[key2]
                delete this.generationPoints[key2]
                //}
            }
            k++
        }
        
        for(var i in this.generationPoints){
            if(!this.generationPoints[i].land){
                delete this.generationPoints[i]
                delete this.graph[i]
                delete lands[i]
            }
        }
        for(var i in lands){
            for(var j in lands){
                if(i != j){
                    if(landInside(i,j)){
                        delete this.generationPoints[i]
                        delete this.graph[i]
                        delete lands[i]
                    }
                }
            }
        }
        
        this.generationPoints = this.generationPoints.filter(a => a != undefined)
        lands = lands.filter(a => a != undefined)
/*
        for(var i in lands){
            var land = lands[i]
            if(polygonOrder(land) != -1){
                lands[i] = land//.reverse()
            }
        }
*/        
        return lands

    initTowns(){
        var towns = []
        for(var i in this.lands){
            var land = this.lands[i]
            for(var ii in land){
                var band = land[ii]
                var indexStart = Math.floor(Math.random() * band.length)
                
                var point = polygonEdgeHalfPointMoved(band, indexStart,1)
                var port = polygonEdgeHalfPointMoved(band, indexStart,-1)
                this.tryAddTown(towns,point[0],point[1],land,port)
                
                for(var j = 1;j<band.length;j+=2){
                    if(Math.random() < 0.5){
                        var ix  = (indexStart - (-j)) % band.length
                        
                        point = polygonEdgeHalfPointMoved(band, ix,1)
                        port = polygonEdgeHalfPointMoved(band, ix,-1)
                        this.tryAddTown(towns,point[0],point[1],land,port)
                    }
                }
            }
        }
        for(var i in this.oldgenerationPoints){
            var point = this.oldgenerationPoints[i]
            
            if(Math.random() < 0.5){
                var landAround = getPolygonInside(this.lands,point.x,point.y)
                if(landAround != null)
                    this.tryAddTown(towns,point.x,point.y,landAround,false)
            }
        }
        return towns
    }
    tryAddTown(towns,x,y,landAround,port){
        for(var i in towns){
            var town = towns[i]
            if(Math.abs(town.x - x) < this.TOWN_DISTANCE_LIMIT && Math.abs(town.y - y) < this.TOWN_DISTANCE_LIMIT && town.land == landAround)
                return
        }
        var town = new Town(x,y,landAround,port)
        var chunk = this.getChunkFromCoords(x,y)
        town.setChunk(this.chunks[chunk])
        towns.push(town)
    }
    getChunkFromCoords(x,y){
        var chunk_x = Math.max(0,Math.min(Math.floor(x / this.WIDTH * this.CHUNKS_PER_SIDE - 0.5), this.CHUNKS_PER_SIDE-2))
        var chunk_y = Math.max(0,Math.min(Math.floor(y / this.WIDTH * this.CHUNKS_PER_SIDE - 0.5), this.CHUNKS_PER_SIDE-2))
        return chunk_x+'#'+chunk_y
    }
    generateChunks(){
        var chunkLookup = {}
        for(var i = 0;i<this.CHUNKS_PER_SIDE-1;i++){
            for(var j = 0;j<this.CHUNKS_PER_SIDE-1;j++){
                var l = this.WIDTH / this.CHUNKS_PER_SIDE * i
                var t = this.WIDTH / this.CHUNKS_PER_SIDE * j
                var r = this.WIDTH / this.CHUNKS_PER_SIDE * (i+2)
                var b = this.WIDTH / this.CHUNKS_PER_SIDE * (j+2)

                var key = i+'#'+j

                var chunk = new Chunk(i,j,this.lands,l,t,r,b)
//                if(chunk.polygons.length > 0)
                chunkLookup[key] = chunk
            }
        }
        return chunkLookup
    }
    populateTowns(){
        for(var i in this.towns){
            var town = this.towns[i]                
            var chunk = this.getChunkFromCoords(town.x,town.y)
            town.setChunk(this.chunks[chunk])

            if(i % 4 == 0 || i == 1){
                var teamColor = getRandomColor()
                while(this.teams.filter(a => a.color == teamColor).length > 0)
                    teamColor = getRandomColor()
                    
                var newTeam = new Team(teamColor,true)
                
                this.teams.push(newTeam)
                
                var newUnit = new Unit(town.x,town.y,10+Math.ceil(Math.random()*89),newTeam,town.land)
                this.addUnitToTown(newUnit,town)
            }
        }
    }
    addUnitToTown(newUnit,town){
        var chunk = this.getChunkFromCoords(newUnit.x,newUnit.y)

        newUnit.setChunk(this.chunks[chunk])
        
        this.units.push(newUnit)
        
        town.setOccupyingUnit(newUnit)
    }

    }
    getNonVoronoiables(){

    }
    generateVoronois(){
        var rawVoronoiables = this.getVoronoiables().sort((a,b) => (a.x+'#'+a.y).localeCompare(b.x+'#'+b.y))
        var voronoiables = []
        if(rawVoronoiables.length > 0)
            voronoiables.push(rawVoronoiables[0])
        var lastWithTheSame
        for(var i=1;i<rawVoronoiables.length;i++){
            var previous = rawVoronoiables[i-1]
            var present = rawVoronoiables[i]
            if(previous.x != present.x || previous.y != present.y){
                voronoiables.push(present)
            } else {
                present.voronoi = null
            }
        }
        var nonVoronoiables = this.getNonVoronoiables()
        for(var i in nonVoronoiables){
            nonVoronoiables[i].voronoi = null
        }
        
        var voronoiableByChunk = {}
        for(var key in this.chunks){
            voronoiableByChunk[key] = []
        }
        for(var i in voronoiables){
            var voronoiable = voronoiables[i]
            
            var chunk = voronoiable.chunk
            var nearbyCodes = chunk.nearChunkCodes
            for(var j in nearbyCodes){
                var nearbyCode = nearbyCodes[j]
                if(nearbyCode in this.chunks){
                    voronoiableByChunk[nearbyCode].push(voronoiable)
                }
            }
        }
        for(var i in voronoiables){
            var voronoiable = voronoiables[i]
            
            var chunk = voronoiable.chunk

            var chunkcode = chunk.x+'#'+chunk.y
            
            var defaultPolygon = null
            for(var j in chunk.polygons){
                var poly = chunk.polygons[j]
                if(almostHitTest(poly,voronoiable.x,voronoiable.y)){
                    defaultPolygon = poly
                    break
                }
            }
            if(defaultPolygon == null){             //so much fix
                voronoiable.voronoi = null
                continue
            }

            voronoiable.voronoi = defaultPolygon.map(a => a.slice())
            var vbc = voronoiableByChunk[chunkcode]
            for(var j in vbc){

                if(voronoiable.voronoi == null)
                    break
                
                var point1 = voronoiable
                var point2 = vbc[j]
                
                if(point1 == point2 || point1.land != point2.land)
                    continue
                    
                if(point1.x != point2.x || point1.y != point2.y){
                    var bisector = bisectorFromTwoPoints(point1.x,point1.y,point2.x,point2.y)

                    var land = voronoiable.voronoi
                    var newLands
                    if(bisector.vertical){
                        newLands = verticalLinearLimitPolygons([land],bisector.x,bisector.firstLeftBottom)
                    } else {
                        newLands = nonVerticalLinearLimitPolygons([land],bisector.a,bisector.b,bisector.firstLeftBottom)
                    }
                    
                    voronoiable.voronoi = polygonHittingPoints(newLands,voronoiable.x,voronoiable.y)
                }

            }
            var limit = this.WIDTH / this.CHUNKS_PER_SIDE
            //if(voronoiable.voronoi != null)
                //voronoiable.voronoi = triacontadigonalLimit(voronoiable.x,voronoiable.y,voronoiable.voronoi, limit)

            
        }
        this.generateVoronoiGraph()
        this.mergevoronoisByGraphs()
    }
    generateVoronoiGraph(){
        var voronoiables = this.getVoronoiables().filter(a => a.voronoi != null && a.team != null && a.occupyingUnit == null)
        
        var voronoiableByChunk = {}
        for(var key in this.chunks){
            voronoiableByChunk[key] = []
        }
        for(var i in voronoiables){
            var voronoiable = voronoiables[i]
            
            var chunk = voronoiable.chunk
            var nearbyCodes = chunk.nearChunkCodes
            for(var j in nearbyCodes){
                var nearbyCode = nearbyCodes[j]
                if(nearbyCode in this.chunks){
                    voronoiableByChunk[nearbyCode].push({ix:i,voronoiable:voronoiable})
                }
            }
        }

        this.mergedVoronois = []
        this.voronoiGraph = {}
        for(var i = 0;i<voronoiables.length;i++){
            this.mergedVoronois[i] = {team:voronoiables[i].team,voronoi:voronoiables[i].voronoi}
            this.voronoiGraph[i] = {}
        }
        for(var i = 0;i<voronoiables.length;i++){
            var voronoiable1 = voronoiables[i]
            
            var chunk = voronoiable1.chunk

            var chunkcode = chunk.x+'#'+chunk.y

            var vbc = voronoiableByChunk[chunkcode]
            for(var j in vbc){
                var key2 = vbc[j].ix
                var voronoiable2 = vbc[j].voronoiable
                
                if(/*dist(voronoiable1.x,voronoiable1.y,voronoiable2.x,voronoiable2.y) > this.GENERATION_POINTS_REVERSE_DENSITY*2 || */voronoiable1.team != voronoiable2.team)
                    continue
                
                var land1Segments = getPolygonSegments(voronoiable1.voronoi)
                var land2Segments = getPolygonSegments(voronoiable2.voronoi)
                for(var k in land1Segments){
                    for(var l in land2Segments){
                        var s1 = land1Segments[k]
                        var s2 = land2Segments[l]
                        /*
                        if(dist(s1[0][0],s1[0][1],s2[0][0],s2[0][1]) < 1 && dist(s1[1][0],s1[1][1],s2[1][0],s2[1][1]) < 1){
                            graph[i][j] = true
                            graph[j][i] = true
                        }*/
                        
                        if(dist(s1[0][0],s1[0][1],s2[1][0],s2[1][1]) < 0.001 && dist(s1[1][0],s1[1][1],s2[0][0],s2[0][1]) < 0.001){
                        //if(distanceFromLine(s1[0][0],s1[0][1],s2[0],s2[1]) < 0.001 && distanceFromLine(s1[1][0],s1[1][1],s2[0],s2[1]) < 0.001){
                            this.voronoiGraph[i][key2] = true
                            this.voronoiGraph[key2][i] = true
                        }
                    }
                }
            }
        }
    }
    mergevoronoisByGraphs(){
        var k = 0
        while(Object.values(this.voronoiGraph).filter(x=>Object.values(x).length > 0).length > 0 && k<=1000){
            var key1 = Object.keys(this.voronoiGraph)[0]
            if(Object.keys(this.voronoiGraph[key1]).length == 0){
                delete this.voronoiGraph[key1]
                continue
            }
            for(var key2 in this.voronoiGraph[key1]){
                //if(key2 in this.mergedVoronois/* && this.mergedVoronois[key1].team == this.mergedVoronois[key2].team*/){
                    if(key2 in this.mergedVoronois){
                        var merged = mergePolygonsOnSides(this.mergedVoronois[key1].voronoi,this.mergedVoronois[key2].voronoi)
                        if(merged != null){
                            this.mergedVoronois[key1].voronoi = merged
                        }
                    }
                    for(var key3 in this.voronoiGraph[key2]){
                        if(key3 != key1){
                            this.voronoiGraph[key1][key3] = true
                            if(key3 in this.voronoiGraph)
                                this.voronoiGraph[key3][key1] = true
                        }
                    }
                    delete this.voronoiGraph[key1][key2]
                    delete this.voronoiGraph[key2]
                    delete this.mergedVoronois[key2]
                //}
            }
            k++
        }
    }

    trySetPathForUnit(unit,x,y,objectToBePressed){
        var possiblePath = this.pathPossible(unit,x,y,objectToBePressed)
        
        var possibleBarking = null
        
        var possible = !unit.embarking && possiblePath != null
        var seaPossible = false
        if(!possible && unit.towntaken && unit.towntaken.port || unit.embarking && !unit.inProcessOfEmbarking()){
            seaPossible = this.seaPathPossible(unit,x,y,objectToBePressed)
            possible = seaPossible != null
            if(possible){
                possibleBarking = this.getSeaPathCrossing(unit,seaPossible,objectToBePressed)
                possiblePath = seaPossible
            }
        }

        if(possible){
            if(objectToBePressed){
                if(objectToBePressed instanceof Unit && objectToBePressed.towntaken != null)
                    objectToBePressed = objectToBePressed.towntaken
                if(dist(unit.x,unit.y,objectToBePressed.x,objectToBePressed.y) < 1){
                    possible = false
                } else {
                    if(objectToBePressed instanceof Unit && objectToBePressed.towntaken != null)
                        objectToBePressed = objectToBePressed.towntaken
                    //unit.setPath(objectToBePressed.x,objectToBePressed.y,objectToBePressed)
                    unit.setLinePath(possiblePath.slice(1),objectToBePressed)
                }
            } else {
//                unit.setPath(x,y)

                unit.setLinePath(possiblePath.slice(1))
            }
        }
        if(possible && seaPossible && !unit.embarking){
            unit.embarking = true
            unit.embarkingProgress = 0
        }
        if(possible && seaPossible && possibleBarking != null){
            unit.barkingPoint = possibleBarking.barkingPoint
            unit.barkingLand = possibleBarking.land
        } else {
            unit.barkingPoint = null
            unit.barkingLand = null
        }

        return possible
    }

    fightBetweenUnits(unit1,unit2){
        var unit1defenceFactor = 1
        var unit2defenceFactor = 1
        
        var STANDARD_HIT = 1
        
        if(unit1.towntaken != null)
            unit1defenceFactor *= 1.2
        if(unit2.towntaken != null)
            unit2defenceFactor *= 1.2
        
        var unit1attackingFloatBefore = unit1.attackingFloat
        var unit2attackingFloatBefore = unit2.attackingFloat
        
        unit1.attackingFloat += STANDARD_HIT / unit2defenceFactor
        unit2.attackingFloat += STANDARD_HIT / unit1defenceFactor
        
        unit1.size -= Math.floor(unit2.attackingFloat) - Math.floor(unit2attackingFloatBefore)
        unit2.size -= Math.floor(unit1.attackingFloat) - Math.floor(unit1attackingFloatBefore)
        
        if(unit1.size <= 0){
            unit1.size = 0
            unit1.die()
        }
        if(unit2.size <= 0){
            unit2.size = 0
            unit2.die()
        }
    }
    update(){
        var unitsByChunk = {}
        
        for(var key in this.chunks){
            unitsByChunk[key] = []
        }
        for(var i in this.units){
            var unit = this.units[i]
            
            var chunk = unit.chunk
            var nearbyCodes = chunk.nearChunkCodes
            for(var j in nearbyCodes){
                var nearbyCode = nearbyCodes[j]
                if(nearbyCode in this.chunks){
                    unitsByChunk[nearbyCode].push(unit)
                }
            }
        }
        
        const SPEED = 2
        var change = false
        for(var i in this.units){
            var unit = this.units[i]
            
            if(unit.path.length > 0){
                if(unit.embarking && unit.embarkingProgress < unit.size){
                    var pepf = unit.embarkingProgressFloat
                    unit.embarkingProgressFloat += this.EMBARKING_PROGRESS_SPEED
                    unit.embarkingProgress = Math.min(unit.size, unit.embarkingProgress + Math.floor(unit.embarkingProgressFloat) - Math.floor(pepf))
                    change = true

                } else {
                    var pushback = false
                    var oldx = unit.x
                    var oldy = unit.y
                    
                    var point = unit.path[0]
                    var angle = Math.atan2(unit.y - point[1], unit.x - point[0])
                    if(unit.target != null){
                        if(unit.target instanceof Unit){
                            if(unit.target.path.length > 0 || unit.target.dead)
                                unit.target = null
                        }
                    }
                    if(dist(unit.x,unit.y,point[0],point[1]) < SPEED){
                        unit.x = point[0]
                        unit.y = point[1]
                        unit.path = unit.path.slice(1)
                        
                        if(unit.path.length == 0 && unit.target != null){
                            if(unit.target instanceof Town){
                                unit.tryTakeOverTown()
                                change = true
                            }
                            if(unit.target instanceof Unit && unit.team == unit.target.team){
                                unit.tryToMergeWithTarget()
                                change = true
                            }
                        }
                    } else {
                        unit.x -= SPEED * Math.cos(angle)
                        unit.y -= SPEED * Math.sin(angle)
                    }
                    this.updateChunkForUnit(unit)

                    var chunkcode = unit.chunk.x+'#'+unit.chunk.y
                    var unitsToCheck = unitsByChunk[chunkcode]
                    for(var j in unitsToCheck){
                        var unit2 = unitsToCheck[j]
                        
                        if(unit.team != unit2.team && unit.tooClose(unit2)){
                            this.fightBetweenUnits(unit,unit2)
                            pushback = true
                        }
                        if(unit.team == unit2.team && unit.towntaken == null){
                            if(unit.target != null && (unit.target == unit2 || unit.target.occupyingUnit != null && unit.target.occupyingUnit == unit2) && unit2.path.length == 0 && unit.tooClose(unit2) && unit.atPathEndAndInDirection(unit2)){
                                unit.tryToMergeWithTarget()
                                pushback = true
                                change = true
                            }/*
                            if(unit2.towntaken == null && unit.target != unit2 && unit2.path.length == 0 && unit.tooClose(unit2) && unit.atPathEndAndInDirection(unit2)){
                                pushback = true
                                //change = false
                            }*/
                        }
                    }
                    if(pushback){
                        unit.x = oldx
                        unit.y = oldy
                        this.updateChunkForUnit(unit)
                    } else {
                        if(unit.embarking)
                            unit.tryDisembark()
                        /*
                        var land = getPolygonInside(this.lands,unit.x,unit.y)
                        if(land != null){
                            unit.land = land
                            unit.embarking = false
                        } else {
                            unit.land = null
                            unit.embarking = true
                        }
                        change = true*/
                    }
                }
            }
        }
        this.units = this.units.filter(a => !a.dead)
        //if(change)
            this.generateVoronois()
            
        this.growUnits()
    }
    updateChunkForUnit(unit){
        var newChunk = this.getChunkFromCoords(unit.x,unit.y)
        unit.setChunk(this.chunks[newChunk])
    }
    growUnits(){
        var change = false
        for(var i in this.towns){
            var town = this.towns[i]
            
            if(town.team != null && town.occupyingUnit == null){
                town.growingFloat += this.TOWN_GROWING_RATE
                if(town.growingFloat >= 1){
                    var newUnit = new Unit(town.x,town.y,Math.floor(town.growingFloat),town.team,town.land)
                    this.addUnitToTown(newUnit,town)
                    
                    change = true

                    town.growingFloat = 0
                }
            }
        }
        for(var i in this.units){
            var unit = this.units[i]
            if(unit.embarking)
                continue
                
            var growingFloatBefore = unit.growingFloat
            if(unit.towntaken){
                unit.growingFloat += this.TOWN_GROWING_RATE
            } else {
                unit.growingFloat += this.COUNTRYSIDE_GROWING_RATE
            }
            unit.size = Math.min(99, unit.size + Math.floor(unit.growingFloat) - Math.floor(growingFloatBefore))
        }
        if(change)
            this.generateVoronois()

    }
}
const COLOR_LETTERS = '123456789ABCDE'
function getRandomColor() {
  var color = '#';
  for (var i = 0; i < 6; i++) {
    color += COLOR_LETTERS[Math.floor(Math.random() * COLOR_LETTERS.length)];
  }
  return color;
}
function darkColor(color){
    return !'BCDEF'.includes(color[1]) && !'ABCDEF'.includes(color[3]) && !'CDEF'.includes(color[5])
}
class View {
    constructor(canv,model,state){
        this.PADDING = 20
        
        this.canv = canv
        this.ctx = this.canv.getContext('2d')
        this.ctx.translate(this.PADDING,this.PADDING)
        this.model = model
        
        this.state = state
        
        this.GLOW_COLOR = '#fff'
        this.SELECTED_COLOR = '#ff6'
    }
    updateModel(model){
        this.model = model
        this.draw()
    }
    draw(){
        this.drawBackground()
        this.drawModel()
        this.drawPanel()
    }
    drawBackground(){
        this.ctx.fillStyle = this.state.state.backgroundColor
        this.ctx.fillRect(-this.PADDING,-this.PADDING,this.canv.width,this.canv.height)

        this.ctx.fillStyle = '#00000022'
        this.ctx.fillRect(-this.PADDING,-this.PADDING,this.canv.width,this.canv.height)

    }
    modelMouseCoords(){
        if(this.state.state.mouseCoords != null){
            var raw_x = this.state.state.mouseCoords.x
            var raw_y = this.state.state.mouseCoords.y
            
            var x = raw_x - this.PADDING
            var y = raw_y - this.PADDING
            
            if(x > 0 && y > 0 && x < this.model.WIDTH && y < this.model.WIDTH)
                return {x: x, y: y}
        }
        return null
    }
    drawModel(){
        this.ctx.fillStyle = '#fff'
        this.ctx.fillRect(0,0,this.model.WIDTH,this.model.WIDTH)
        this.ctx.strokeStyle = '#000'
        this.ctx.lineWidth = 2
        this.ctx.strokeRect(0,0,this.model.WIDTH,this.model.WIDTH)
        this.ctx.lineWidth = 1
        
        this.drawLands(true)
        this.drawVoronois()
        this.drawLands(false)

        //this.drawChunks()
        //this.drawGenerationPoints()
        this.drawTowns()
        this.drawUnits()
    }
    drawPanel(){
        const PANEL_X = this.state.state.PANEL_X
        
        this.ctx.fillStyle = this.state.state.backgroundColor
        this.ctx.fillRect(PANEL_X,0,this.canv.width-this.model.WIDTH-this.PADDING*3,this.canv.height-this.PADDING*2)
        this.ctx.fillStyle = '#ffffff44'
        this.ctx.fillRect(PANEL_X,0,this.canv.width-this.model.WIDTH-this.PADDING*3,this.canv.height-this.PADDING*2)

        this.ctx.strokeStyle = '#000'
        this.ctx.lineWidth = 2
        this.ctx.strokeRect(PANEL_X,0,this.canv.width-this.model.WIDTH-this.PADDING*3,this.canv.height-this.PADDING*2)
        this.ctx.lineWidth = 1
        
        this.ctx.translate(PANEL_X,0)
        
        var mouseCoordsTransformed = this.state.state.mouseCoordsTransformed()
        for(var i in this.state.state.panelControls){
            var control = this.state.state.panelControls[i]
            
            control.draw(this.ctx,mouseCoordsTransformed)
        }
        this.ctx.translate(-PANEL_X,0)
    }
    drawChunks(){
        for(var key in this.model.chunks){
            for(var i in this.model.chunks[key].polygons){
                this.drawLand(this.model.chunks[key].polygons[i],getRandomColor())
            }
        }
    }
    drawLands(fill){/*
        for(var i in this.model.oldlands){
            if(!(i in this.model.oldgenerationPoints) || this.model.oldgenerationPoints[i].land){
                this.drawLand(this.model.oldlands[i],'#800')
            } else {
                //this.drawLand(this.model.lands[i],'#fff4')
            }
        }*/        
        this.ctx.lineWidth = 2

        for(var i in this.model.lands){
            if(!(i in this.model.generationPoints) || this.model.generationPoints[i].land){
                if(fill){
                    this.drawLand(this.model.lands[i],'#000000')
                } else {
                    this.drawLand(this.model.lands[i],'#000000','#00000000')
                }
            } else {
                //this.drawLand(this.model.lands[i],'#fff4')
            }
        }
        this.ctx.lineWidth = 1

    }
    drawVoronois(){
        var voronoiables = this.model.mergedVoronois//this.model.getVoronoiables()
        for(var i in voronoiables){
            var voronoiable = voronoiables[i]
            if(voronoiable.voronoi != null){
                if(voronoiable.team != null){
                    this.drawLand(voronoiable.voronoi,'#000000',voronoiable.team.color+'88')
                }
            }
        }
    }
    drawLand(land,strokeStyle,fillStyle){
        this.ctx.strokeStyle = strokeStyle
        this.ctx.fillStyle = fillStyle ? fillStyle : strokeStyle + '44'
        for(var i in land){
            this.ctx.beginPath()

            var band = land[i]
            for(var j in band){
                var point = band[j]
                if(j == 0){
                    this.ctx.moveTo(point[0],point[1])
                } else {
                    this.ctx.lineTo(point[0],point[1])
                }
            }
            this.ctx.closePath()
            
            this.ctx.stroke()
        }
        this.ctx.beginPath()
        for(var i in land){

            var band = land[i]
            for(var j in band){
                var point = band[j]
                if(j == 0){
                    this.ctx.moveTo(point[0],point[1])
                } else {
                    this.ctx.lineTo(point[0],point[1])
                }
            }
            
        }
        this.ctx.closePath()
        this.ctx.fill()
        
    }
    drawGenerationPoints(){
        this.ctx.strokeStyle = '#000000'
        for(var i in this.model.generationPoints){
            var point = this.model.generationPoints[i]
//            if(point.land)
                this.ctx.strokeRect(point.x-2,point.y-2,4,4)
        }
    }
    mouseOnTown(mouseCoords, town){
        var {WIDTH} = townData()
        
        return mouseCoords != null && mouseCoords.x > town.x-WIDTH*5/4 && mouseCoords.x < town.x+WIDTH*5/4 && mouseCoords.y > town.y-WIDTH*2 && mouseCoords.y < town.y
    }
    drawTowns(){
        var WIDTH = 6
        
        var mouseCoords = this.modelMouseCoords()
        var focusedUnit = this.getUnitByMouse(mouseCoords)
        
        var focusedTown = focusedUnit == null ? this.getTownByMouse(mouseCoords) : null

        for(var i in this.model.towns){
            var town = this.model.towns[i]

            var focused = /*town.occupyingUnit != null && town.occupyingUnit == focusedUnit || */town == focusedTown
            
            this.ctx.strokeStyle = town.team ? '#000' : '#333'
            this.ctx.fillStyle = town.team ? town.team.color : '#ccc'
            
            if(focused)
                this.ctx.strokeStyle = this.GLOW_COLOR
            
            this.ctx.fillRect(town.x-WIDTH*5/4,town.y-WIDTH,WIDTH,WIDTH)
            this.ctx.strokeRect(town.x-WIDTH,town.y-WIDTH,WIDTH,WIDTH)
            
            this.ctx.fillRect(town.x+WIDTH/4,town.y-WIDTH*1.5,WIDTH,WIDTH*1.5)
            this.ctx.strokeRect(town.x+WIDTH/4,town.y-WIDTH*1.5,WIDTH,WIDTH*1.5)
            
            this.ctx.fillRect(town.x-WIDTH/2,town.y-WIDTH*2,WIDTH,WIDTH*2)
            this.ctx.strokeRect(town.x-WIDTH/2,town.y-WIDTH*2,WIDTH,WIDTH*2)
        }
    }
    mouseOnUnit(mouseCoords, unit){
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()
        
        var realOffset = unit.towntaken ? OFFSET : 0
        
        return mouseCoords != null && mouseCoords.x > unit.x-WIDTH/2 && mouseCoords.x < unit.x+WIDTH/2 && mouseCoords.y > unit.y-HEIGHT/2-realOffset && mouseCoords.y < unit.y+HEIGHT/2-realOffset
    }
    getUnitByMouse(mouseCoords){
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()
        
        var units = this.model.units.sort((a,b) => b.y - a.y)
        for(var i in units){
            var unit = units[i]
            if(this.mouseOnUnit(mouseCoords, unit))
                return unit
        }
        return null
    }
    getTownByMouse(mouseCoords){
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()
        
        var towns = this.model.towns.sort((a,b) => b.y - a.y)
        for(var i in towns){
            var town = towns[i]
            if(this.mouseOnTown(mouseCoords, town))
                return town
        }
        return null
    }
    drawUnits(){
        var {WIDTH,HEIGHT,OFFSET,PADDING} = unitData()
        
        var mouseCoords = this.modelMouseCoords()
        
        var focusedUnit = this.getUnitByMouse(mouseCoords)
        var focusedTown = focusedUnit == null ? this.getTownByMouse(mouseCoords) : null

        //for(var i=0;i<this.model.units.length;i++){
        for(var i=this.model.units.length - 1;i>=0;i--){
            var unit = this.model.units[i]
            var teamColor = unit.team.color
            
            var selected = unit == this.model.selectedUnit
            var focused = unit == focusedUnit

            if(unit.path.length > 0){
                this.ctx.lineWidth = 2
                
                this.ctx.strokeStyle = '#f00'
                
                this.ctx.beginPath()
                this.ctx.moveTo(unit.x,unit.y)
                
                var point
                var lastPoint = [unit.x,unit.y]
                for(var j in unit.path){
                    point = unit.path[j]
                    this.ctx.lineTo(point[0],point[1])
                    if(j < unit.path.length - 1)
                        lastPoint = point
                }
                var ARROW_SIZE = 10
                var ARROW_ANGLE = Math.PI/8
                var angle = Math.atan2(lastPoint[1] - point[1], lastPoint[0] - point[0])
                this.ctx.lineTo(point[0],point[1])
                this.ctx.lineTo(point[0] + Math.cos(angle - ARROW_ANGLE)*ARROW_SIZE,point[1] + Math.sin(angle - ARROW_ANGLE)*ARROW_SIZE)
                this.ctx.lineTo(point[0],point[1])
                this.ctx.lineTo(point[0] + Math.cos(angle + ARROW_ANGLE)*ARROW_SIZE,point[1] + Math.sin(angle + ARROW_ANGLE)*ARROW_SIZE)
                this.ctx.stroke()
                
                this.ctx.lineWidth = 1
            }
            
            this.ctx.strokeStyle = focused ? this.GLOW_COLOR :'#000'
            this.ctx.fillStyle = teamColor
            
            if(focused || selected)
                this.ctx.lineWidth = 2
                
            if(focused)
                this.ctx.strokeStyle = this.GLOW_COLOR
            
            if(selected)
                this.ctx.strokeStyle = this.SELECTED_COLOR
                
            var realOffset = unit.towntaken ? OFFSET : 0
            this.ctx.fillRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-realOffset,WIDTH,HEIGHT)
            this.ctx.strokeRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-realOffset,WIDTH,HEIGHT)

            if(!selected && !focused)
                this.ctx.strokeStyle = darkColor(teamColor) ? '#fffa' : '#000'
            
            
            if(unit.size >= 10){
                var firstNumber = (''+unit.size)[0]
                var secondNumber = (''+unit.size)[1]
                    
                this.drawNumber(firstNumber , unit.x-WIDTH/2 + PADDING  ,unit.y-HEIGHT/2-realOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                this.drawNumber(secondNumber, unit.x         + PADDING/2,unit.y-HEIGHT/2-realOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
            } else {                
                this.drawNumber(unit.size   , unit.x-WIDTH/8            ,unit.y-HEIGHT/2-realOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
            }
            if(selected && this.model.selectedUnitDivision != 1){
                
                var dividedSize = unit.sizeAfterDivision(this.model.selectedUnitDivision)
                
                var newerOffset = realOffset + 5
                this.ctx.fillRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-newerOffset,WIDTH,HEIGHT)
                this.ctx.strokeRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-newerOffset,WIDTH,HEIGHT)

                if(!selected && !focused)
                    this.ctx.strokeStyle = darkColor(teamColor) ? '#fffa' : '#000'
            
                if(dividedSize >= 10){
                    var firstNumber = (''+dividedSize)[0]
                    var secondNumber = (''+dividedSize)[1]
                        
                    this.drawNumber(firstNumber , unit.x-WIDTH/2 + PADDING  ,unit.y-HEIGHT/2-newerOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                    this.drawNumber(secondNumber, unit.x         + PADDING/2,unit.y-HEIGHT/2-newerOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                } else {                
                    this.drawNumber(dividedSize   , unit.x-WIDTH/8            ,unit.y-HEIGHT/2-newerOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                }
            }
            if(unit.embarking && unit.embarkingProgress < unit.size){
                
                var newerOffset = OFFSET
                var noOffset = 0
                
                var unembarkedSize = unit.size - unit.embarkingProgress
                var embarkedSize = unit.embarkingProgress
                
                // UNEMBARKED
                this.ctx.fillRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-newerOffset,WIDTH,HEIGHT)
                this.ctx.strokeRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-newerOffset,WIDTH,HEIGHT)

                if(!selected && !focused)
                    this.ctx.strokeStyle = darkColor(teamColor) ? '#fffa' : '#000'
            
                if(unembarkedSize >= 10){
                    var firstNumber = (''+unembarkedSize)[0]
                    var secondNumber = (''+unembarkedSize)[1]
                        
                    this.drawNumber(firstNumber , unit.x-WIDTH/2 + PADDING  ,unit.y-HEIGHT/2-newerOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                    this.drawNumber(secondNumber, unit.x         + PADDING/2,unit.y-HEIGHT/2-newerOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                } else {                
                    this.drawNumber(unembarkedSize   , unit.x-WIDTH/8            ,unit.y-HEIGHT/2-newerOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                }
                
                //EMBARKED
                this.ctx.fillRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-noOffset,WIDTH,HEIGHT)
                this.ctx.strokeRect(unit.x-WIDTH/2,unit.y-HEIGHT/2-noOffset,WIDTH,HEIGHT)

                if(!selected && !focused)
                    this.ctx.strokeStyle = darkColor(teamColor) ? '#fffa' : '#000'
            
                if(embarkedSize >= 10){
                    var firstNumber = (''+embarkedSize)[0]
                    var secondNumber = (''+embarkedSize)[1]
                        
                    this.drawNumber(firstNumber , unit.x-WIDTH/2 + PADDING  ,unit.y-HEIGHT/2-noOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                    this.drawNumber(secondNumber, unit.x         + PADDING/2,unit.y-HEIGHT/2-noOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                } else {                
                    this.drawNumber(embarkedSize   , unit.x-WIDTH/8            ,unit.y-HEIGHT/2-noOffset + PADDING, WIDTH/2-PADDING*1.5,HEIGHT-PADDING*2)
                }
            }
            this.ctx.lineWidth = 1
            
        }
    }
    drawNumber(num,x,y,w,h){
        var coords = vectorNumbers[num]
        this.ctx.beginPath()
        for(var i in coords){
            var point = coords[i]
            if(i == 0){
                this.ctx.moveTo(x+point[0]*w,y+point[1]*h)
            } else {
                this.ctx.lineTo(x+point[0]*w,y+point[1]*h)
            }
        }
        this.ctx.stroke()
    }
}
class State {
    constructor(controller){
        this.controller = controller
        this.panelControls = []
        this.mouseCoords = null
        
        this.backgroundColor = '#AAAAAA'
        
        this.PANEL_X = 670
    }
    setMouseCoords(coords){
        this.mouseCoords = coords
    }
    mouseCoordsTransformed(){
        var PANEL_X = this.PANEL_X
        return this.mouseCoords ? new Object({x:this.mouseCoords.x-PANEL_X-20,y:this.mouseCoords.y-20}) : null
    }
    mouseDown(coords){
        var mouseCoordsTransformed = this.mouseCoordsTransformed()
        for(var i in this.panelControls){
            var control = this.panelControls[i]
            
            control.tryClick(mouseCoordsTransformed)
        }
    }
    borderColor(){
        return darkColor(this.backgroundColor) ? '#ffffffcc' : '#000000cc'
    }
}

class Control {
    constructor(x,y,w,h){
        this.x = x
        this.y = y
        this.w = w
        this.h = h
    }
    focus(mouseCoordsTransformed){
        return mouseCoordsTransformed != null && mouseCoordsTransformed.x > this.x && mouseCoordsTransformed.x < this.x+this.w && mouseCoordsTransformed.y > this.y && mouseCoordsTransformed.y < this.y+this.h
    }
    tryClick(mouseCoordsTransformed){
        return false
    }
}
class TextControl extends Control {
    constructor(x,y,w,h,text,color){
        super(x,y,w,h)
        
        if(typeof text == 'string')
            this.text = [text]
        else
            this.text = text
        this.color = color
    }
    draw(ctx,mouseCoordsTransformed){
        ctx.strokeStyle = this.color
        ctx.lineWidth = 2
        
        var theight = this.h / (this.text.length + (this.text.length-1) / 3)
        var hpause = theight / 3
        
        for(var i in this.text){
            var row = this.text[i]
            
            var twidth = this.w / (row.length + (row.length-1) / 3)
            var wpause = twidth / 3
            for(var j in row){
                var letter = row[j]

                var coords = vectorLetters[letter]
                
                if(coords != undefined){
                    ctx.beginPath()
                    for(var k in coords){
                        var point = coords[k]
                        if(k == 0){
                            ctx.moveTo(this.x + point[0]*twidth + j*(twidth+wpause), this.y + point[1]*theight + i*(theight+hpause))
                        } else {
                            ctx.lineTo(this.x + point[0]*twidth + j*(twidth+wpause), this.y + point[1]*theight + i*(theight+hpause))
                        }
                    }
                    ctx.stroke()
                }
            }
        }
        ctx.lineWidth = 1
    }
}
class Button extends Control {
    constructor(x,y,w,h,text,color,borderColor,func){
        super(x,y,w,h)
        this.text = text
        this.color = color
        this.borderColor = borderColor
        this.func = func
        this.textControl = new TextControl(x+h*0.2,y+h*0.2,w-h*0.4,h-h*0.4,text,borderColor)
    }
    draw(ctx,mouseCoordsTransformed){
        ctx.strokeStyle = this.borderColor
        ctx.fillStyle = this.color
        
        ctx.fillRect(this.x,this.y,this.w,this.h)
        if(this.focus(mouseCoordsTransformed)){
            ctx.fillStyle = '#ffffff88'
            ctx.fillRect(this.x,this.y,this.w,this.h)
        }
        ctx.strokeRect(this.x,this.y,this.w,this.h)
        
        ctx.lineWidth = 2
        this.textControl.draw(ctx,mouseCoordsTransformed)
        ctx.lineWidth = 1
    }
    tryClick(mouseCoordsTransformed){
        if(this.focus(mouseCoordsTransformed)){
            return this.func()
        }
    }
}
class Controller {
    constructor(){
        this.canv = document.getElementById('canv')
        
        this.state = {state:new GamePrepareState(this),mouseCoords:null}
        
        this.model = new Model()
        this.view = new View(this.canv,this.model,this.state)
                
        this.view.draw()
        
        this.pressedUnit = null
        this.dragStart = null
        
        this.playingTeam = null
        
        this.pause = false
        
        this.prepareListeners()
        
        this.loop()
    }
    changeState(state){
        this.state.state = state
    }
    regenerateModel(){
        this.model = new Model()
        this.pause = false
        this.view.updateModel(this.model)
    }
    goToMenu(){
        this.model = new Model()
        this.changeState(new GamePrepareState(this))
        this.view.updateModel(this.model)
    }
    prepareListeners(){
        this.canv.addEventListener('click',(e) => this.click(e))
        this.canv.addEventListener('mousedown',(e) => this.mouseDown(e))
        this.canv.addEventListener('mousemove',(e) => this.mouseMove(e))
        this.canv.addEventListener('mouseup',(e) => this.mouseUp(e))
    }
    click(e){
        e.preventDefault()
        var coords = this.getCoordsFromEvent(e)
        /*
        if(coords.x > this.view.PADDING && coords.y > this.view.PADDING && coords.x < this.model.WIDTH+this.view.PADDING && coords.y < this.model.WIDTH+this.view.PADDING){
            this.clicked = false
            if(coords != null)
                this.model.click(coords.x-this.view.PADDING,coords.y-this.view.PADDING)
            else
                this.model.click(null,null)
        }*/
    }
    mouseDown(e){
        e.preventDefault()
        var coords = this.getCoordsFromEvent(e)
        
        this.state.state.setMouseCoords(coords)
        
        this.pressedUnit = this.view.getUnitByMouse(this.view.modelMouseCoords())
        if(this.pressedUnit == null)
            this.dragStart = coords
        
        this.state.state.mouseDown(coords)
    }
    mouseMove(e){
        e.preventDefault()
        var coords = this.getCoordsFromEvent(e)
        
        this.state.state.setMouseCoords(coords)
        this.view.draw()
    }
    mouseUp(e){
        e.preventDefault()
        var coords = this.getCoordsFromEvent(e)
        var modelCoords = this.view.modelMouseCoords()
        
        if(modelCoords != null)
            if(this.model.selectedUnit == null){
                if(this.pressedUnit != null){
                    var currentlyPressedUnit = this.view.getUnitByMouse(modelCoords)

                    if(currentlyPressedUnit == this.pressedUnit && !currentlyPressedUnit.inProcessOfEmbarking()){
                        this.model.selectUnit(this.pressedUnit)
                        if(!this.state.state.gameplay){
                            this.playingTeam = this.model.selectedUnit.team
                            this.changeState(new GamePlayUnselected(this))
                        }
                    }
                }
            } else {
                var currentlyPressedUnit = this.view.getUnitByMouse(modelCoords)

                if(this.pressedUnit != null && this.pressedUnit == currentlyPressedUnit){
                    if(this.pressedUnit == this.model.selectedUnit){
                        if(this.model.selectedUnit.sizeAfterDivision(this.model.selectedUnitDivision) == 1)
                            this.model.selectedUnitDivision = 1
                        else if(this.model.selectedUnitDivision > 0.5 && this.model.selectedUnit.size >= 4)
                            this.model.selectedUnitDivision -= 0.25
                        else
                            this.model.selectedUnitDivision /= 2
                    } else {
                        var oldPath = this.model.selectedUnit.path
                        var oldTarget = this.model.selectedUnit.target
                        var oldLand = this.model.selectedUnit.land
                        var oldEmbarking = this.model.selectedUnit.embarking
                        var oldBarkingPoint = this.model.selectedUnit.barkingPoint
                        var oldBarkingLand = this.model.selectedUnit.barkingLand
                        
                        var pathCreated = this.model.trySetPathForUnit(this.model.selectedUnit, modelCoords.x, modelCoords.y,currentlyPressedUnit)

                        if(pathCreated){
                            var newUnit = this.model.selectedUnit.leavePartOfUnit(this.model.selectedUnitDivision)
                            if(newUnit != null){
                                //if(!(this.model.selectedUnit.embarking && this.model.selectedUnit.inProcessOfEmbarking())){
                                newUnit.path = oldPath
                                newUnit.target = oldTarget
                                
                                newUnit.land = oldLand
                                newUnit.embarking = oldEmbarking
                                newUnit.embarkingProgress = newUnit.size
                                newUnit.barkingPoint = oldBarkingPoint
                                newUnit.barkingLand = oldBarkingLand
                                //}
                                if(newUnit.towntaken != null) {
                                    this.model.selectedUnit.x = newUnit.towntaken.x
                                    this.model.selectedUnit.y = newUnit.towntaken.y
                                }
                                this.model.units.push(newUnit)
                            }
                        } else
                            this.model.selectedUnit.removePath()
                        this.model.deselectUnit()
                    }
                } else {
                    var oldPath = this.model.selectedUnit.path
                    var oldTarget = this.model.selectedUnit.target
                    var oldLand = this.model.selectedUnit.land
                    var oldEmbarking = this.model.selectedUnit.embarking
                    var oldBarkingPoint = this.model.selectedUnit.barkingPoint
                    var oldBarkingLand = this.model.selectedUnit.barkingLand

                    var pressedTown = this.view.getTownByMouse(modelCoords)
                    var pathCreated
                    if(pressedTown != null){
                        pathCreated = this.model.trySetPathForUnit(this.model.selectedUnit, modelCoords.x, modelCoords.y,pressedTown)
                    } else if(currentlyPressedUnit != null) {
                        pathCreated = this.model.trySetPathForUnit(this.model.selectedUnit, modelCoords.x, modelCoords.y,currentlyPressedUnit)
                    } else {
                        pathCreated = this.model.trySetPathForUnit(this.model.selectedUnit, modelCoords.x, modelCoords.y)
                    }
                    if(pathCreated){
                        var newUnit = this.model.selectedUnit.leavePartOfUnit(this.model.selectedUnitDivision)
                        if(newUnit != null){
                            //if(!(this.model.selectedUnit.embarking && this.model.selectedUnit.inProcessOfEmbarking())){
                            newUnit.path = oldPath
                            newUnit.target = oldTarget
                            
                            newUnit.land = oldLand
                            newUnit.embarking = oldEmbarking
                            newUnit.embarkingProgress = newUnit.size
                            newUnit.barkingPoint = oldBarkingPoint
                            newUnit.barkingLand = oldBarkingLand
                            //}
                            if(newUnit.towntaken != null) {
                                this.model.selectedUnit.x = newUnit.towntaken.x
                                this.model.selectedUnit.y = newUnit.towntaken.y
                            }
                            this.model.units.push(newUnit)
                        }
                        this.model.generateVoronois()
                    } else
                        this.model.selectedUnit.removePath()
                    this.model.deselectUnit()
                }

            }
        
        this.pressedUnit = null
        this.dragStart = false
        this.view.draw()
    }
    getCoordsFromEvent(e){
        var rect = this.canv.getBoundingClientRect()
        
        var x,y
        if(e.touches != undefined && e.touches.length > 0){
            x = (e.touches[0].clientX - rect.left) / rect.width * this.canv.width
            y = (e.touches[0].clientY - rect.top) / rect.height * this.canv.height
        } else {
            x = (e.clientX - rect.left) / rect.width * this.canv.width
            y = (e.clientY - rect.top) / rect.height * this.canv.height
        }
        
        return {x:x,y:y}
    }
    pausePlay(){
        this.pause = !this.pause
    }
    loop(){
        if(!this.pause){
            this.model.update()
            this.view.draw()
        }
        let t = this
        setTimeout(()=>{t.loop()},100)
    }
}
function init(){
    var controller = new Controller()
}
